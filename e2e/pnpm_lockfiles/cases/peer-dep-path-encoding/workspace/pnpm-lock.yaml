lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      b:
        specifier: workspace:*
        version: link:../packages/b
      c:
        specifier: file:../packages/c
        version: file:../packages/c(b@packages+b)

  ../packages/b: {}

  ../packages/c:
    dependencies:
      b:
        specifier: '*'
        version: 2.0.1

packages:

  b@2.0.1:
    resolution: {integrity: sha512-JBWAj6f91ocNLbdg1jCGrxHXSWbQDsxgqVmKeO0TellEcq9LCvJ97iWG6p3otCt/v08/hHrWwAB9vNYS9y70IQ==}
    engines: {node: '>= 0.8.0'}

  c@file:../packages/c:
    resolution: {directory: ../packages/c, type: directory}
    peerDependencies:
      b: '*'

snapshots:

  b@2.0.1: {}

  c@file:../packages/c(b@packages+b):
    dependencies:
      b: link:../packages/b
